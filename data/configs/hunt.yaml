target_processes:
  - name: "HuntGame.exe"
    check_path: false
  - name: "hunt.exe"
    check_path: true
  - name: "WinMTR-Report.exe"
    check_path: true
  - name: "EasyAntiCheat_EOS_Setup.exe"
    check_path: true
  - name: "nvcontainer.exe"
    check_path: false

include_domains:
  - "*.amazonaws.com"
  - "*.awsapps.com"
  - "*.amazon-adsystem.com"
  - "*.easyanticheat.net"
  - "*.vivox.com"
  - "*.vivox.net"
  - "*.crytek.com"
  - "*.cryengine.com"

exclude_domains:
  - "*.api.aws"
  - "*.cloudflarebolt.com"
  - "*.cloudflarepartners.com"
  - "*.cloudflareresolve.com"
  - "*.cloudflaretest.com"
  - "*.cloudflare-dm-cmpimg.com"
  - "*.cloudflare-ipfs.com"
  - "*.cloudflare-terms-of-service-abuse.com"
  - "*.cloudflare-gateway.com"
  - "*.cloudflareapps.com"
  - "*.pacloudflare.com"
  - "*.sn-cloudflare.com"
  - "*.argotunnel.com"
  - "*.cfargotunnel.com"
  - "*.every1dns.net"
  - "*.a2z.com"
  - "*.akamaized.net"
  - "*.awsstatic.com"
  - "*.ssl-images-amazon.com"
  - "*.amazongamelift.com"
  - "*.akamaitechnologies.com"
  - "*.microsoft.com"
  - "*.visualstudio.com"
  - "*.windows.net"
  - "*.fastly.com"
  - "*.cloudapp.net"
  - "*.azmk8s.io"
  - "*.arin.net"

include_ips: []
exclude_ips: []

ports:
  tcp: [61088, "20000-20099", 3074, 3478, "4379-4380", "27000-27050"]
  udp: [61088, "20000-20099", 3074, 3478, "4379-4380", "27000-27050"]

scan_interval: 0.1
logged_connections_max: 500
dns_timeout: 2.0
list_flush_interval: 2.0

list_rules:
  SYN_SENT:
    action: add_to_main
    target: both
  ESTABLISHED:
    action: ignore
    target: none
  TIME_WAIT:
    action: ignore
    target: none
  CLOSE_WAIT:
    action: add_to_exclude
    target: both
  FIN_WAIT1:
    action: ignore
    target: none
  FIN_WAIT2:
    action: ignore
    target: none
  LAST_ACK:
    action: ignore
    target: none
  CLOSING:
    action: ignore
    target: none
  LISTEN:
    action: ignore
    target: none
  NONE:
    action: ignore
    target: none
