include_ips: []
exclude_ips: []

ports:
  tcp: [61088, "20000-20099", 3074, 3478, "4379-4380", "27000-27050"]
  udp: [61088, "20000-20099", 3074, 3478, "4379-4380", "27000-27050"]

lists:
  ip_file: "ipset-all.txt"
  domain_file: "list-general-user.txt"
  general_domain_file: "list-general.txt"
  exclude_ip_file: "ipset-exclude-user.txt"
  exclude_domain_file: "list-exclude-user.txt"
  session_ip_file: "fix.txt"

scan_interval: 0.1
logged_connections_max: 5000
dns_timeout: 2.0

dns_resolve_statuses:
  - "SYN_SENT"

color_console: true
skip_local_ips: true
highlight_style: "BRIGHT_WHITE"

list_rules:
  SYN_SENT:
    action: add_to_main
    target: both
  ESTABLISHED:
    action: ignore
    target: none
  TIME_WAIT:
    action: ignore
    target: none
  CLOSE_WAIT:
    action: add_to_exclude
    target: both
  FIN_WAIT1:
    action: ignore
    target: none
  FIN_WAIT2:
    action: ignore
    target: none
  LAST_ACK:
    action: ignore
    target: none
  CLOSING:
    action: ignore
    target: none
  LISTEN:
    action: ignore
    target: none
  NONE:
    action: ignore
    target: none
