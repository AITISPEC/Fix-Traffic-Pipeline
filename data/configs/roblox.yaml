pass_ips:
  - "199.46.0.0/16"
  - "128.116.0.0/16"
  - "151.101.0.0/16"
  - "52.252.0.0/16"
  - "20.201.0.0/16"
  - "20.109.0.0/16"
  - "20.110.0.0/16"
  - "20.94.0.0/16"
  - "4.209.0.0/16"
  - "4.207.0.0/16"

ports:
  tcp: [80, 443, "3478-3480"]
  udp: ["3478-3480", "49152-65535"]

lists:
  ip_file: "ipset-all.txt"
  domain_file: "list-general-user.txt"
  general_domain_file: "list-general.txt"
  exclude_ip_file: "ipset-exclude-user.txt"
  exclude_domain_file: "list-exclude-user.txt"
  session_ip_file: "fix.txt"

scan_interval: 0.02
logged_connections_max: 500
dns_timeout: 2.0

dns_resolve_statuses:
  - "SYN_SENT"
  - "ESTABLISHED"

console:
  max_proc_width: 21
  max_ip_width: 16
  max_port_width: 6
  max_domain_width: 30

color_console: true
skip_local_ips: true
highlight_style: "BRIGHT_WHITE"
