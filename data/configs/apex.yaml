target_processes:
  - name: "r5apex_dx12.exe"
    check_path: false
  - name: "ApexLauncher.exe"
    check_path: false
  - name: "crashmsg.exe"
    check_path: true
  - name: "start_protected_game.exe"
    check_path: true
  - name: "EasyAntiCheat_EOS_Setup.exe"
    check_path: true
  - name: "nvcontainer.exe"
    check_path: false

include_domains:
  - "*.amazonaws.com"
  - "*.awsapps.com"
  - "*.amazon-adsystem.com"
  - "*.easyanticheat.net"
  - "*.vivox.com"
  - "*.vivox.net"
  - "*.origin.com"
  - "*.respawn.com"
  - "*.mozambiquehe.re"
  - "*.apexlegends.com"
  - "*.apexlegendsapi.com"
  - "*.apexlegendsstatus.com"
  - "*.apexnews.com"

exclude_domains:
  - "*.api.aws"
  - "*.cloudflarebolt.com"
  - "*.cloudflarepartners.com"
  - "*.cloudflareresolve.com"
  - "*.cloudflaretest.com"
  - "*.cloudflare-dm-cmpimg.com"
  - "*.cloudflare-ipfs.com"
  - "*.cloudflare-terms-of-service-abuse.com"
  - "*.cloudflare-gateway.com"
  - "*.cloudflareapps.com"
  - "*.pacloudflare.com"
  - "*.sn-cloudflare.com"
  - "*.argotunnel.com"
  - "*.cfargotunnel.com"
  - "*.every1dns.net"
  - "*.a2z.com"
  - "*.akamaized.net"
  - "*.awsstatic.com"
  - "*.ssl-images-amazon.com"
  - "*.amazongamelift.com"
  - "*.eac-cdn.com"
  - "*.akamaihd.net"
  - "*.akamaitechnologies.com"
  - "*.ea.com"
  - "*.tnt-ea.com"
  - "*.ec2.com"
  - "*.myswitch.com"
  - "*.cloudfront.net"

include_ips:
  - "52.94.0.0/15"
  - "54.68.0.0/14"
  - "63.32.0.0/14"
  - "52.56.0.0/16"

exclude_ips: []

ports:
  tcp: [80,443,9988,17502,"20000-20100",22990,42127,"27015-27030","27036-27037","1024-1124",3216,"9960-9969",18000,18060,18120,27900,28910,29900]
  udp: [3659,"37000-40000","14000-14016","22990-23006","25200-25300","27015-27030","27031-27036",4380,"3478-3479",5060,5062,"50000-50016"]

scan_interval: 0.1
logged_connections_max: 500
dns_timeout: 2.0
list_flush_interval: 2.0

list_rules:
  SYN_SENT:
    action: add_to_main
    target: both
  ESTABLISHED:
    action: ignore
    target: none
  TIME_WAIT:
    action: ignore
    target: none
  CLOSE_WAIT:
    action: add_to_exclude
    target: both
  FIN_WAIT1:
    action: ignore
    target: none
  FIN_WAIT2:
    action: ignore
    target: none
  LAST_ACK:
    action: ignore
    target: none
  CLOSING:
    action: ignore
    target: none
  LISTEN:
    action: ignore
    target: none
  NONE:
    action: ignore
    target: none
