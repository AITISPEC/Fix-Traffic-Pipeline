app:
  python_stop_timeout_ms: 2000
  default_lists_path: ''
terminal:
  theme: Dark
  font_family: Cascadia Code
  font_size: 10
  max_proc_width: 20
  max_ip_width: 16
  max_port_width: 6
  max_domain_width: 12
  color_console: true
  skip_local_ips: true
  highlight_style: BRIGHT_WHITE
monitor: 
logging:
  level: INFO
  max_file_size: 1048576
  backup_count: 5
selected_theme: fluent-dark
lists:
  ip_file: ipset-all.txt
  domain_file: list-general-user.txt
  general_domain_file: list-general.txt
  exclude_ip_file: ipset-exclude-user.txt
  exclude_domain_file: list-exclude-user.txt
  session_ip_file: fix.txt
